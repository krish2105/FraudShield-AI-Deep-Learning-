name: CI

# Continuous integration (Phase 6): install, lint, run the test suite, and
# verify the training pipeline runs end-to-end on the synthetic sample.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (non-blocking)
        run: ruff check src api scripts tests || true

      - name: Generate sample data
        run: python src/make_sample_data.py

      - name: Run test suite
        run: pytest -q

      - name: Smoke-train the pipeline (sample data, quick)
        run: python -c "from src.train_all import train_all; train_all(epochs=2)"

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t fraudshield:ci .
